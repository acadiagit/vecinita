# Nginx Configuration for Gradual Frontend Rollout
# Supports routing between old frontend (v1) and new frontend (v2)
# via cookie-based feature flags and weighted upstream configuration

upstream frontend_v1 {
  # Old JavaScript/React 18/Vite 5/Tailwind v3 frontend
  server old-frontend:3000;
}

upstream frontend_v2 {
  # New TypeScript/React 18/Vite 6/Tailwind v4 frontend
  server vecinita-frontend:80;
}

# Split upstream for percentage-based rollout
upstream frontend_split {
  # Gradual rollout: 90% to v1, 10% to v2
  # Adjust weights based on rollout strategy:
  # Week 1-2: 95% v1, 5% v2
  # Week 3-4: 75% v1, 25% v2
  # Week 5-6: 50% v1, 50% v2
  # Week 7+: 0% v1, 100% v2
  
  server old-frontend:3000 weight=9;
  server vecinita-frontend:80 weight=1;
}

server {
  listen 80;
  server_name _;
  
  # Enable CORS headers
  add_header 'Access-Control-Allow-Origin' '*' always;
  add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
  add_header 'Access-Control-Allow-Headers' 'Content-Type' always;
  
  location / {
    # Route selection logic:
    # 1. If user has explicit feature flag cookie, use it
    # 2. Otherwise use percentage-based split
    
    set $backend "frontend_split";
    
    # Check for feature flag cookie (use v2 if set to 'true')
    if ($cookie_use_new_frontend = "true") {
      set $backend "frontend_v2";
    }
    
    # Check for feature flag cookie (use v1 if set to 'false')
    if ($cookie_use_new_frontend = "false") {
      set $backend "frontend_v1";
    }
    
    # Route to selected backend
    proxy_pass http://$backend;
    
    # Proxy headers
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $server_name;
    
    # Preserve original request
    proxy_redirect off;
    
    # Buffering for streaming responses (SSE)
    proxy_buffering off;
    proxy_cache off;
    
    # WebSocket support (if needed)
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    
    # Timeouts for long-lived SSE connections
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
  }
  
  # Health check endpoint
  location /health {
    access_log off;
    return 200 "healthy\n";
    add_header Content-Type text/plain;
  }
  
  # API endpoints that should always go to new backend
  # (Ensure v2 frontend can reach backend)
  location ~ ^/(config|ask-stream)$ {
    proxy_pass http://vecinita-agent:8000;
    
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 3600s;
  }
}

# Alternative: Docker Compose overlay network DNS
# This configuration assumes all services are on the same Docker network
# If services are on different networks, update upstream server names accordingly
