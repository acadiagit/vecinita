services:
  # Embedding Service - Lightweight FastAPI service for text embeddings
  embedding-service:
    build:
      context: ./backend
      dockerfile: Dockerfile.embedding
    image: vecinita-embedding:latest
    container_name: vecinita-embedding
    ports:
      - "8001:8001"
    environment:
      PORT: "8001"
      PYTHONUNBUFFERED: "1"
      HF_HOME: /tmp/huggingface_cache
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # FastAPI Agent Service - Lightweight, calls embedding service
  vecinita-agent:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: vecinita-agent:latest
    container_name: vecinita-agent
    depends_on:
      embedding-service:
        condition: service_healthy
    ports:
      - "8000:8000"  # Local: 8000 | Render: 10000
    environment:
      # Core Infrastructure
      PORT: "8000"  # Local dev port (Render uses 10000)
      PYTHONUNBUFFERED: "1"
      TF_ENABLE_ONEDNN_OPTS: "0"
      EMBEDDING_SERVICE_URL: "http://embedding-service:8001"  # Docker internal network
      
      # Database
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_KEY: ${SUPABASE_KEY}
      DATABASE_URL: ${DATABASE_URL}
      
      # LLM API Keys
      GROQ_API_KEY: ${GROQ_API_KEY}
      OPEN_API_KEY: ${OPEN_API_KEY}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      
      # Web Search
      TAVILY_API_KEY: ${TAVILY_API_KEY}
      
      # Tracing & Monitoring
      LANGSMITH_TRACING: ${LANGSMITH_TRACING:-false}
      LANGSMITH_ENDPOINT: ${LANGSMITH_ENDPOINT}
      LANGSMITH_API_KEY: ${LANGSMITH_API_KEY}
      LANGSMITH_PROJECT: ${LANGSMITH_PROJECT}
      
      # Local LLM (Optional)
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL}
      OLLAMA_MODEL: ${OLLAMA_MODEL}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "sh", "-c", "curl -f http://localhost:$$PORT/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  # Background Scraper Service - Heavy dependencies with Playwright
  # Uncomment to run scraper alongside agent
  # vecinita-scraper:
  #   build:
  #     context: ./backend
  #     dockerfile: Dockerfile.scraper
  #   image: vecinita-scraper:latest
  #   container_name: vecinita-scraper
  #   depends_on:
  #     embedding-service:
  #       condition: service_healthy
  #   environment:
  #     SUPABASE_URL: ${SUPABASE_URL}
  #     SUPABASE_KEY: ${SUPABASE_KEY}
  #     DATABASE_URL: ${DATABASE_URL}
  #     PYTHONUNBUFFERED: "1"
  #     EMBEDDING_SERVICE_URL: "http://embedding-service:8001"
  #   volumes:
  #     - ./data:/app/data
  #     - ./backend/data:/app/backend/data
  #   # Run scraper once and exit
  #   command: python -m src.scraper.cli scrape data/urls.txt
  #   restart: "no"

  # Frontend Vite Service
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_BACKEND_URL: ${VITE_BACKEND_URL:-http://localhost:8000}  # Local: localhost:8000 | Render: https://vecinita-agent.onrender.com
    image: vecinita-frontend:latest
    container_name: vecinita-frontend
    depends_on:
      vecinita-agent:
        condition: service_healthy
    ports:
      - "3000:80"
    restart: unless-stopped

# Optional: define a network
# networks:
#   default:
#     name: vecinita-net
