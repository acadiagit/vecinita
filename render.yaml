services:
  # Backend FastAPI Service (Docker)
  - type: web
    name: vecinita-backend
    runtime: docker
    region: virginia
    plan: starter
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    
    # Environment variables
    envVars:
      - key: PORT
        value: "10000"
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: TF_ENABLE_ONEDNN_OPTS
        value: "0"
      - key: GROQ_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: LANGSMITH_TRACING
        sync: false
      - key: LANGSMITH_API_KEY
        sync: false
      - key: LANGSMITH_PROJECT
        sync: false
      - key: OLLAMA_BASE_URL
        sync: false
      - key: OLLAMA_MODEL
        sync: false
      - key: EMBEDDING_MODEL
        sync: false
      - key: USE_LOCAL_EMBEDDINGS
        sync: false
    
    # Health check
    healthCheckPath: /health

  # Frontend Vite Service (Docker)
  - type: web
    name: vecinita-frontend
    runtime: docker
    region: virginia
    plan: starter
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    
    # Environment variables (build-time for Vite)
    envVars:
      - key: VITE_BACKEND_URL
        value: https://vecinita-backend.onrender.com

  # Optional: PostgreSQL Database (if not using external Supabase)
  # Uncomment if you want to manage PostgreSQL on Render
  # - type: pserv
  #   name: vecinita-db
  #   runtime: docker
  #   plan: free
  #   region: virginia
  #   ipAllowList: []
