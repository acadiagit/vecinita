services:
  # Backend FastAPI Service (Docker)
  - type: web
    name: vecinita-backend
    runtime: docker
    region: virginia
    plan: starter
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    autoDeployTrigger: commit
    
    # Environment variables (non-secret only - secrets set via Dashboard)
    # To apply secrets, link the "vecinita" environment group in the Render Dashboard
    envVars:
      - key: PORT
        value: "10000"
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: TF_ENABLE_ONEDNN_OPTS
        value: "0"
    
    # Health check
    healthCheckPath: /health

  # Frontend Vite Service (Docker)
  - type: web
    name: vecinita-frontend
    runtime: docker
    region: virginia
    plan: starter
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    autoDeployTrigger: commit
    
    # Environment variables (build-time for Vite)
    # Note: Frontend uses PUBLIC URL because browser makes API calls
    # For backend-to-backend calls, use internal: vecinita-backend:10000
    envVars:
      - key: VITE_BACKEND_URL
        value: https://vecinita-backend.onrender.com

  # Optional: PostgreSQL Database (if not using external Supabase)
  # Uncomment if you want to manage PostgreSQL on Render
  # - type: pserv
  #   name: vecinita-db
  #   runtime: docker
  #   plan: free
  #   region: virginia
  #   ipAllowList: []
