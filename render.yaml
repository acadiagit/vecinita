services:
  # Backend FastAPI Service
  - type: web
    name: vecinita-backend
    env: python
    region: virginia
    plan: starter
    buildCommand: |
      pip install uv && uv sync --frozen
    startCommand: |
      uv run uvicorn src.agent.main:app --host 0.0.0.0 --port $PORT
    rootDir: backend
    
    # Environment variables
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: GROQ_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
    
    # Health check
    healthCheckPath: /
    
    # Mount volumes if needed
    # volumes:
    #   - name: data
    #     path: /app/data
    #     ttl: "24h"

  # Frontend Vite Service
  - type: web
    name: vecinita-frontend
    env: node
    region: virginia
    plan: starter
    buildCommand: |
      npm ci && npm run build
    startCommand: |
      npm run preview -- --host 0.0.0.0 --port $PORT
    rootDir: frontend
    
    # Environment variables if needed for build time
    envVars:
      - key: VITE_API_URL
        value: https://vecinita-backend.onrender.com
    
    # Routes (if using with internal API routing)
    # routes:
    #   - path: /api/*
    #     destination: https://vecinita-backend.onrender.com

  # Optional: PostgreSQL Database (if not using external Supabase)
  # Uncomment if you want to manage PostgreSQL on Render
  # - type: pserv
  #   name: vecinita-db
  #   env: docker
  #   plan: free
  #   region: oregon
  #   ipAllowList: []
